<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>祭祀花禮 | Amber花藝</title>
    <meta
      name="description"
      content="Amber花藝祭祀花禮，提供懷恩籃、蓮花燈、財寶箱等祭祀紙藝與花禮作品。"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
:root {
  --ink: #2b2621;
  --muted: #766d63;
  --paper: #f8f2ea;
  --linen: #eadfD2;
  --milk: #d8c5b1;
  --mocha: #8b715d;
  --coffee: #4a382c;
  --cream: #fffaf3;
  --line: rgba(74, 56, 44, 0.15);
  --shadow: 0 22px 54px rgba(74, 56, 44, 0.12);
}

* {
  box-sizing: border-box;
}

html {
  scroll-behavior: smooth;
}

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: Inter, "Noto Serif TC", system-ui, sans-serif;
  line-height: 1.6;
}

img {
  display: block;
  max-width: 100%;
}

a {
  color: inherit;
  text-decoration: none;
}

.site-header {
  position: fixed;
  top: 0;
  left: 0;
  z-index: 20;
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  padding: 18px clamp(18px, 4vw, 56px);
  color: var(--coffee);
  transition: background 180ms ease, box-shadow 180ms ease, color 180ms ease;
}

.site-header.is-scrolled,
.site-header.is-open {
  background: rgba(248, 242, 234, 0.94);
  box-shadow: 0 10px 30px rgba(74, 56, 44, 0.07);
  color: var(--ink);
  backdrop-filter: blur(18px);
}

.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-family: "Noto Serif TC", serif;
  font-size: 1.05rem;
  font-weight: 700;
  letter-spacing: 0;
}

.brand-mark {
  display: block;
  width: 64px;
  height: 48px;
  object-fit: contain;
}

.site-nav {
  display: flex;
  gap: clamp(18px, 3vw, 34px);
  align-items: center;
  font-size: 0.94rem;
  font-weight: 600;
}

.site-nav a {
  padding: 6px 0;
  border-bottom: 1px solid transparent;
}

.site-nav a:hover {
  border-color: currentColor;
}

.nav-toggle {
  display: none;
  width: 42px;
  height: 42px;
  border: 1px solid currentColor;
  border-radius: 50%;
  background: transparent;
  color: inherit;
}

.nav-toggle span {
  display: block;
  width: 18px;
  height: 1px;
  margin: 6px auto;
  background: currentColor;
}

.page-main {
  padding-top: 86px;
}

.hero {
  position: relative;
  min-height: 92vh;
  display: grid;
  align-items: center;
  overflow: hidden;
  background: var(--paper);
}

.hero-image {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.hero-overlay {
  position: absolute;
  inset: 0;
  background:
    linear-gradient(90deg, rgba(248, 242, 234, 0.9), rgba(248, 242, 234, 0.68) 43%, rgba(248, 242, 234, 0.08)),
    linear-gradient(0deg, rgba(248, 242, 234, 0.24), rgba(248, 242, 234, 0));
}

.hero-content {
  position: relative;
  z-index: 1;
  width: min(680px, calc(100% - 36px));
  margin-left: clamp(18px, 8vw, 110px);
  padding-top: 64px;
  color: var(--coffee);
}

.eyebrow {
  margin: 0 0 14px;
  color: var(--mocha);
  font-size: 0.78rem;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}

.hero .eyebrow {
  color: var(--mocha);
}

h1,
h2,
h3,
p {
  overflow-wrap: anywhere;
}

h1,
h2,
h3 {
  margin: 0;
  font-family: "Noto Serif TC", serif;
  line-height: 1.16;
}

h1 {
  font-size: clamp(3rem, 8vw, 8rem);
  font-weight: 700;
  overflow-wrap: normal;
  white-space: nowrap;
  word-break: keep-all;
}

h2 {
  font-size: clamp(2rem, 4vw, 3.45rem);
}

h3 {
  font-size: 1.24rem;
}

.hero-copy {
  max-width: 570px;
  margin: 24px 0 0;
  font-size: clamp(1rem, 1.6vw, 1.22rem);
}

.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 34px;
}

.button {
  display: inline-flex;
  min-height: 46px;
  align-items: center;
  justify-content: center;
  padding: 12px 20px;
  border: 1px solid transparent;
  border-radius: 999px;
  font-weight: 800;
  transition: transform 160ms ease, background 160ms ease, color 160ms ease;
}

.button:hover {
  transform: translateY(-2px);
}

.button.primary {
  background: var(--coffee);
  color: #fff;
}

.button.secondary {
  border-color: rgba(74, 56, 44, 0.32);
  color: var(--coffee);
}

.section-band {
  background: var(--linen);
}

.section-inner {
  width: min(1120px, calc(100% - 36px));
  margin: 0 auto;
  padding: clamp(70px, 10vw, 120px) 0;
}

.intro-grid,
.contact-grid,
.course-grid {
  display: grid;
  grid-template-columns: minmax(0, 0.8fr) minmax(0, 1fr);
  gap: clamp(32px, 7vw, 92px);
  align-items: start;
}

.intro-copy {
  display: grid;
  gap: 14px;
}

.founder-grid {
  grid-template-columns: minmax(0, 0.88fr) minmax(280px, 0.72fr);
  align-items: center;
}

.founder-name {
  margin-top: 10px;
  color: var(--coffee);
  font-size: 1.35rem;
}

.founder-photo {
  margin: 0;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  box-shadow: var(--shadow);
}

.founder-photo img {
  display: block;
  width: 100%;
  aspect-ratio: 3 / 4;
  object-fit: cover;
  object-position: center 38%;
}

.intro p,
.courses p,
.contact p,
.section-heading p {
  color: var(--muted);
  font-size: 1.05rem;
}

.section-heading {
  margin-bottom: 34px;
}

.section-heading.split {
  display: grid;
  grid-template-columns: minmax(0, 0.75fr) minmax(0, 1fr);
  gap: 30px;
  align-items: end;
}

.product-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 18px;
}

.product-card {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
}

.product-visual {
  min-height: 260px;
  background:
    linear-gradient(0deg, rgba(255, 250, 243, 0.52), rgba(255, 250, 243, 0.08)),
    linear-gradient(135deg, #f4ece1, #cdb49d);
}

.product-visual img {
  width: 100%;
  height: 260px;
  object-fit: cover;
  object-position: center 42%;
}

.product-content {
  padding: 22px;
}

.product-content span {
  display: block;
  margin-bottom: 14px;
  color: var(--mocha);
  font-size: 0.8rem;
  font-weight: 800;
}

.product-content p {
  color: var(--muted);
}

.product-two .product-visual {
  background: linear-gradient(135deg, #efe1d1, #b99b82);
}

.product-three .product-visual {
  background: linear-gradient(135deg, #f8f1e9, #d3bca8);
}

.product-four .product-visual {
  background: linear-gradient(135deg, #e9d9ca, #a78971);
}

.product-five .product-visual {
  background: linear-gradient(135deg, #ead7ca, #b88e76);
}


.courses {
  border-top: 1px solid var(--line);
}

.course-list {
  display: grid;
  gap: 14px;
}

.course-item {
  padding: 24px 0;
  border-bottom: 1px solid var(--line);
}

.course-item:first-child {
  padding-top: 0;
}

.course-item span {
  display: block;
  margin-bottom: 10px;
  color: var(--mocha);
  font-size: 0.8rem;
  font-weight: 800;
}

.course-item p {
  margin-bottom: 0;
}

/* Courses standalone page */
.courses-page {
  padding-top: 92px;
  background: var(--paper);
}

.courses-page .courses {
  min-height: 100vh;
  border-top: 0;
}

.courses-page .course-grid {
  grid-template-columns: 1fr;
  gap: 34px;
}

.courses-page .course-list {
  gap: 22px;
}

.courses-page .course-item {
  display: grid;
  grid-template-columns: minmax(220px, 360px) minmax(0, 1fr);
  gap: 22px 28px;
  align-items: start;
  padding: 24px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: rgba(255, 250, 243, 0.72);
  box-shadow: 0 14px 34px rgba(74, 56, 44, 0.08);
}

.courses-page .course-item:first-child {
  padding-top: 24px;
}

.courses-page .course-item > span,
.courses-page .course-item > h3,
.courses-page .course-item > p,
.courses-page .course-item > ul {
  grid-column: 2;
}

.courses-page .course-photo {
  grid-column: 1;
  grid-row: 1 / span 8;
  margin: 0;
  aspect-ratio: 4 / 3;
}

.courses-page .course-item.no-photo {
  grid-template-columns: 1fr;
}

.courses-page .course-item.no-photo > span,
.courses-page .course-item.no-photo > h3,
.courses-page .course-item.no-photo > p,
.courses-page .course-item.no-photo > ul {
  grid-column: 1;
}

@media (max-width: 760px) {
  .courses-page {
    padding-top: 78px;
  }

  .courses-page .course-item {
    grid-template-columns: 1fr;
    padding: 20px;
  }

  .courses-page .course-photo,
  .courses-page .course-item > span,
  .courses-page .course-item > h3,
  .courses-page .course-item > p,
  .courses-page .course-item > ul {
    grid-column: 1;
  }

  .courses-page .course-photo {
    grid-row: auto;
  }
}

.contact-details {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 26px;
  color: var(--coffee);
  font-weight: 800;
}

.social-button {
  display: inline-flex;
  min-width: 92px;
  height: 44px;
  align-items: center;
  justify-content: center;
  border: 1px solid var(--line);
  border-radius: 999px;
  background: var(--cream);
  color: var(--coffee);
  box-shadow: none;
}

.social-button:hover {
  background: var(--coffee);
  color: var(--cream);
}

.contact-form {
  display: grid;
  gap: 16px;
  padding: clamp(20px, 4vw, 32px);
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--cream);
  box-shadow: none;
}

label {
  display: grid;
  gap: 7px;
  color: var(--muted);
  font-size: 0.92rem;
  font-weight: 800;
}

input,
select,
textarea {
  width: 100%;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
  color: var(--ink);
  font: inherit;
  padding: 12px 13px;
}

textarea {
  resize: vertical;
}

.form-note {
  min-height: 24px;
  margin: 0;
  color: var(--coffee);
  font-weight: 800;
}


.cart-add {
  display: inline-flex;
  min-height: 40px;
  align-items: center;
  justify-content: center;
  margin-top: 14px;
  padding: 10px 16px;
  border: 1px solid rgba(74, 56, 44, 0.28);
  border-radius: 999px;
  background: transparent;
  color: var(--coffee);
  font: inherit;
  font-weight: 800;
  cursor: pointer;
  transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease;
}

.cart-add:hover {
  background: var(--coffee);
  color: var(--cream);
  transform: translateY(-2px);
}

.product-options {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 10px;
  margin-top: 16px;
}

.product-options .cart-add {
  width: 100%;
  margin-top: 0;
  padding: 10px 12px;
  border-radius: 8px;
  text-align: center;
  font-size: 0.92rem;
  line-height: 1.35;
}

.cart-float {
  position: fixed;
  right: 24px;
  bottom: 92px;
  z-index: 55;
  display: inline-flex;
  min-height: 52px;
  align-items: center;
  gap: 10px;
  padding: 12px 18px;
  border: 1px solid rgba(76, 53, 40, 0.16);
  border-radius: 999px;
  background: var(--cream);
  color: var(--coffee);
  font: inherit;
  font-weight: 900;
  box-shadow: 0 18px 34px rgba(76, 53, 40, 0.18);
  cursor: pointer;
}

.cart-count {
  display: inline-grid;
  min-width: 24px;
  height: 24px;
  place-items: center;
  border-radius: 999px;
  background: var(--coffee);
  color: var(--cream);
  font-size: 0.78rem;
}

.cart-overlay {
  position: fixed;
  inset: 0;
  z-index: 70;
  background: rgba(43, 38, 33, 0.28);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
}

.cart-overlay.is-open {
  opacity: 1;
  pointer-events: auto;
}

.cart-panel {
  position: fixed;
  top: 0;
  right: 0;
  z-index: 80;
  display: flex;
  width: min(420px, 100%);
  height: 100%;
  flex-direction: column;
  padding: 24px;
  background: var(--cream);
  color: var(--ink);
  box-shadow: -20px 0 48px rgba(43, 38, 33, 0.18);
  transform: translateX(100%);
  transition: transform 0.22s ease;
}

.cart-panel.is-open {
  transform: translateX(0);
}

.cart-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding-bottom: 18px;
  border-bottom: 1px solid var(--line);
}

.cart-close,
.cart-remove {
  border: 1px solid var(--line);
  border-radius: 999px;
  background: transparent;
  color: var(--coffee);
  font: inherit;
  font-weight: 800;
  cursor: pointer;
}

.cart-close {
  width: 38px;
  height: 38px;
}

.cart-items {
  display: grid;
  gap: 12px;
  margin: 18px 0;
  padding: 0;
  list-style: none;
}

.cart-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  padding: 14px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: var(--paper);
}

.cart-remove {
  padding: 7px 12px;
}

.cart-empty {
  margin: 18px 0;
  color: var(--muted);
}

.cart-line {
  margin-top: auto;
  width: 100%;
}

.site-footer {
  display: flex;
  justify-content: space-between;
  gap: 18px;
  padding: 30px clamp(18px, 4vw, 56px);
  background: var(--coffee);
  color: var(--cream);
}

.back-to-top {
  position: fixed;
  right: 24px;
  bottom: 24px;
  z-index: 50;
  width: 54px;
  height: 54px;
  border: 1px solid rgba(76, 53, 40, 0.18);
  border-radius: 999px;
  background: var(--coffee);
  color: var(--cream);
  font-size: 1.45rem;
  font-weight: 700;
  line-height: 1;
  box-shadow: 0 18px 34px rgba(76, 53, 40, 0.24);
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  transition: opacity 0.2s ease, transform 0.2s ease, background 0.2s ease;
}

.back-to-top.is-visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.back-to-top:hover {
  background: var(--taupe);
}

@media (max-width: 820px) {
  .nav-toggle {
    display: inline-block;
  }

  .site-nav {
    position: absolute;
    top: 76px;
    right: 18px;
    left: 18px;
    display: none;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: var(--cream);
    color: var(--ink);
    box-shadow: var(--shadow);
  }

  .site-header.is-open .site-nav {
    display: flex;
  }

  .site-nav a {
    padding: 13px 8px;
  }

  .hero {
    min-height: 86vh;
  }

  .hero-overlay {
    background: linear-gradient(90deg, rgba(248, 242, 234, 0.94), rgba(248, 242, 234, 0.7));
  }

  .hero-content {
    margin-left: 18px;
  }

  .intro-grid,
  .contact-grid,
  .course-grid,
  .section-heading.split {
    grid-template-columns: 1fr;
  }

  .product-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }

  .site-footer {
    flex-direction: column;
  }

  .back-to-top {
    right: 18px;
    bottom: 18px;
    width: 50px;
    height: 50px;
  }

  .cart-float {
    right: 18px;
    bottom: 82px;
  }

  .cart-panel {
    padding: 20px;
  }
}

@media (max-width: 620px) {
  .product-grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 520px) {
  .hero-actions,
  .button {
    width: 100%;
  }

  h1 {
    font-size: clamp(2.35rem, 13vw, 3.8rem);
  }
}

</style>

    <script>
const header = document.querySelector(".site-header");
const toggle = document.querySelector(".nav-toggle");
const navLinks = document.querySelectorAll(".site-nav a");
const form = document.querySelector(".contact-form");
const note = document.querySelector(".form-note");
const backToTop = document.querySelector(".back-to-top");
const cartButtons = document.querySelectorAll(".cart-add");
const cartFloat = document.querySelector(".cart-float");
const cartCount = document.querySelector(".cart-count");
const cartOverlay = document.querySelector(".cart-overlay");
const cartPanel = document.querySelector(".cart-panel");
const cartClose = document.querySelector(".cart-close");
const cartItems = document.querySelector(".cart-items");
const cartEmpty = document.querySelector(".cart-empty");
let cart = [];

try {
  cart = JSON.parse(localStorage.getItem("amber-cart") || "[]");
} catch (error) {
  cart = [];
}

function saveCart() {
  localStorage.setItem("amber-cart", JSON.stringify(cart));
}

function renderCart() {
  cartCount.textContent = String(cart.length);
  cartItems.innerHTML = "";
  cartEmpty.hidden = cart.length > 0;

  cart.forEach((name, index) => {
    const item = document.createElement("li");
    item.className = "cart-item";
    item.innerHTML = `<strong>${name}</strong><button class="cart-remove" type="button" data-index="${index}">刪除</button>`;
    cartItems.appendChild(item);
  });
}

function openCart() {
  cartOverlay.hidden = false;
  requestAnimationFrame(() => {
    cartOverlay.classList.add("is-open");
    cartPanel.classList.add("is-open");
  });
  cartPanel.setAttribute("aria-hidden", "false");
}

function closeCart() {
  cartOverlay.classList.remove("is-open");
  cartPanel.classList.remove("is-open");
  cartPanel.setAttribute("aria-hidden", "true");
  window.setTimeout(() => {
    if (!cartOverlay.classList.contains("is-open")) {
      cartOverlay.hidden = true;
    }
  }, 220);
}

cartButtons.forEach((button) => {
  button.addEventListener("click", () => {
    cart.push(button.dataset.product);
    saveCart();
    renderCart();
    openCart();
  });
});

cartItems.addEventListener("click", (event) => {
  const removeButton = event.target.closest(".cart-remove");
  if (!removeButton) return;
  cart.splice(Number(removeButton.dataset.index), 1);
  saveCart();
  renderCart();
});

cartFloat.addEventListener("click", openCart);
cartClose.addEventListener("click", closeCart);
cartOverlay.addEventListener("click", closeCart);


function updateHeader() {
  header.classList.toggle("is-scrolled", window.scrollY > 12);
  backToTop.classList.toggle("is-visible", window.scrollY > 420);
}

toggle.addEventListener("click", () => {
  const isOpen = header.classList.toggle("is-open");
  toggle.setAttribute("aria-expanded", String(isOpen));
});

navLinks.forEach((link) => {
  link.addEventListener("click", () => {
    header.classList.remove("is-open");
    toggle.setAttribute("aria-expanded", "false");
  });
});

renderCart();

if (form) {
  form.addEventListener("submit", (event) => {
    event.preventDefault();
    note.textContent = "已收到需求範例。正式上線時可串接 Email、LINE 或表單服務。";
    form.reset();
  });
}

backToTop.addEventListener("click", () => {
  window.scrollTo({ top: 0, behavior: "smooth" });
});

updateHeader();
window.addEventListener("scroll", updateHeader, { passive: true });

</script>
  </body>
</html>
